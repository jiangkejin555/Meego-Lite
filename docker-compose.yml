# Meego Lite · 简版需求与任务协作 — Docker Compose
# Usage:
#   1. docker compose up -d --build
#   2. Open http://localhost:3000

services:
  meego-lite:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meego-lite
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # SQLite DB lives in the mounted volume (persistent across restarts)
      - DATABASE_URL=file:/app/db/custom.db
      - NODE_ENV=production
      # Optional: pass secrets via env at runtime
      # - NEXTAUTH_SECRET=change-me
      # - NEXTAUTH_URL=http://localhost:3000
    volumes:
      # Persist SQLite DB across container rebuilds
      - meego-db:/app/db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  meego-db:
    driver: local
